#Goal: To deploy the built images from CI steps once the CI workflow is succeeded.

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - master

jobs:
  if: github.event.workflow_run.conclusion == 'success'
  deploy:
    runs-on: self-hosted
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7
      
      - name: Copy example Env to Main Env
        uses: cp .env.example .env
      
      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy the containers with docker compose.
        run: |
          docker compose pull
          docker compose up -d