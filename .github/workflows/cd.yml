#Goal : To deploy the built images from CI steps,
#Once the CI workflow is succeeded

name: CD

on:
  workflow_call:
  # workflow_run:
  #   workflows: ["CI"]
  #   branches:
  #     - master 

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Code checkout
        uses: actions/checkout@v7

      - name: Copy example env to .env
        run: cp .env.example .env

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy the containers using docker compose
        run: |
          docker compose build --no-cache frontend
          docker compose pull
          docker compose up -d --force-recreate --no-deps frontend
