#Goal : i have to lint, build, test the code for frontend and backend,
#then push the Images to docker HUb.

name: CI

on:
  push:
    branches: [master]

jobs:

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7

      - name: Set up NodeJSgi
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          chache: npm
          chache-dependency-path: frontend/package-lock.json

      - name: Install npm packages
        run: npm install
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: RUN Tests
        run: npm run test
        working-directory: frontend

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v7

      - name: SetUp GO
        uses: actions/setup-go@v6
        go-version-file: 'go.mod'
        go-version: '1.23'
        check-latest: false
        cache: true
        cache-dependency-path: 'go.sum'

      - name: Run Formatter
        run: go fmt
        working-directory: backend

      - name: Run go Vetter
        run: go vet
        working-directory: backend

      - name: RUN Tests
        run: go test
        working-directory: backend

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest
      

